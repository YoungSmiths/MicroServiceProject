#             data-id: ${spring.application.name}-flow-rules
#             group-id: SENTINEL_GROUP
#             rule-type: flow

# 日志配置
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
