# Seata Server Properties 配置

# 数据源配置
store.mode=db
store.db.datasource=druid
store.db.dbType=mysql
store.db.driverClassName=com.mysql.cj.jdbc.Driver
store.db.url=jdbc:mysql://127.0.0.1:3306/seata?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
store.db.user=root
store.db.password=root
store.db.minConn=5
store.db.maxConn=30
store.db.globalTable=global_table
store.db.branchTable=branch_table
store.db.queryLimit=100
store.db.lockTable=lock_table
store.db.distributedLockTable=distributed_lock_table

# 事务会话超时时间
session.mode=db
session.db.sessionTable=session_table
session.db.queryLimit=100

# 锁配置
lock.mode=db
lock.db.lockTable=lock_table
lock.db.queryLimit=100

# 分组映射
service.vgroupMapping.user-service-tx-group=default
service.vgroupMapping.order-service-tx-group=default
service.enableDegrade=false
service.disableGlobalTransaction=false

# 客户端配置
client.rm.lock.retryInterval=10
client.rm.lock.retryTimes=30
client.rm.lock.retryPolicyBranchRollbackOnConflict=true
client.rm.asyncCommiting.retryInterval=10
client.rm.asyncCommiting.retryCount=10
client.rm.reportRetryCount=5
client.rm.tableMetaCheckEnable=false
client.rm.sqlParserType=druid
client.rm.reportSuccessEnable=false
client.rm.sagaBranchRegisterEnable=false
client.rm.tccBranchRegisterEnable=false
client.rm.tccFenceEnable=false
client.tm.commitRetryInterval=10
client.tm.rollbackRetryInterval=10
client.tm.defaultGlobalTransactionTimeout=60000

# Undo Log 配置
client.undo.dataValidation=true
client.undo.logSerialization=jackson
client.undo.onlyCareUpdateColumns=true
client.undo.logTable=undo_log

# 序列化配置
client.undo.compress.enable=true
client.undo.compress.type=zip
client.undo.compress.initialCapacity=1000

# 高可用配置
client.ha.enable=false
client.ha策略=权重负载均衡
