# Seata Server 配置

# 服务注册配置
registry {
  type = "nacos"
  nacos {
    application = "seata-server"
    serverAddr = "127.0.0.1:8848"
    namespace = "public"
    group = "SEATA_GROUP"
    cluster = "default"
  }
}

# 配置中心配置
config {
  type = "nacos"
  nacos {
    serverAddr = "127.0.0.1:8848"
    namespace = "public"
    group = "SEATA_GROUP"
    dataId = "seataServer.properties"
  }
}

# 服务端配置
server {
  # 服务端口
  vgroupMapping.user-service-tx-group = "default"
  vgroupMapping.order-service-tx-group = "default"
  enableDegrade = false
  disableGlobalTransaction = false
  # 会话超时时间
  session {
    mode = "file"
    maxGlobalSessionTimeout = 60000
    flushDiskMode = "sync"
  }
  # 锁配置
  lock {
    mode = "file"
  }
  # 事务日志存储配置
  recovery {
    committingRetryPeriod = 1000
    asyncCommittingRetryPeriod = 1000
    rollbackingRetryPeriod = 1000
    timeoutRetryPeriod = 1000
  }
}
